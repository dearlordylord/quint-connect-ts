name: Model-Based Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  mbt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm test
        env:
          QUINT_BACKEND: typescript
