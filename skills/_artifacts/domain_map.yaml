  - name: 'Decoding ITF data'
    slug: 'itf-decoding'
    description: 'Mapping Quint types to ITF JSON encoding to native JS types using ITFBigInt, ITFSet, ITFMap, ITFVariant, ItfOption schemas'

  - name: 'Debugging test failures'
    slug: 'debugging'
