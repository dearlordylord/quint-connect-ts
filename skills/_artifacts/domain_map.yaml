library:
  name: '@firfi/quint-connect-ts'
  version: '0.6.0'
  repository: 'https://github.com/dearlordylord/quint-connect-ts-ts'
  description: 'Model-based testing framework connecting Quint formal specifications to TypeScript implementations via ITF trace replay'
  primary_framework: 'framework-agnostic'

