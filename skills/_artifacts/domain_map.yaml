skills:
  - name: 'Setup MBT test'
    slug: 'quint-connect-ts-setup'
    domain: 'setup'
    description: 'Scaffold a quint-connect-ts test from a Quint spec: install deps, choose simple or Effect API, write driver with action handlers and picks, wire state checking, configure trace generation'
    type: 'core'
    covers:
      - 'defineDriver (typed and raw modes)'
      - 'run / quintRun'
      - 'stateCheck helper'
      - 'RunOptions (spec, nTraces, maxSteps, seed, backend)'
      - 'Config (statePath, nondetPath)'
      - 'quintTest / quintIt vitest helpers'
      - 'Simple API (Standard Schema) vs Effect API (Effect Schema)'
      - 'pickFrom (raw mode)'
    tasks:
      - 'Set up a quint-connect-ts test from scratch for a given Quint spec'
      - 'Choose between simple and Effect API'
      - 'Wire up a new action handler when the spec adds an action'
      - 'Add state checking to an existing driver'
      - 'Switch from typed mode to raw step() escape hatch'
      - 'Use config.statePath / nondetPath for nested state'
      - 'Use vitest convenience wrappers (quintTest, quintIt)'
      - 'Tune trace generation (nTraces, maxSteps, seed)'
    failure_modes:
      - mistake: 'Hallucinate createDriver or makeDriver API'
        mechanism: 'The API is defineDriver, not createDriver/makeDriver. AI pattern-matches from other libraries.'
        wrong_pattern: |
          import { createDriver } from "@firfi/quint-connect-ts"
        correct_pattern: |
          import { defineDriver } from "@firfi/quint-connect-ts"
        source: 'src/simple.ts, README.md'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Share mutable state across traces'
        mechanism: 'State initialized outside the factory closure is shared across all traces. Tests pass nondeterministically.'
        wrong_pattern: |
          let count = 0n
          const driver = defineDriver({ Increment: { amount: ITFBigInt } }, () => ({
            Increment: ({ amount }) => { count += amount },
            getState: () => ({ count }),
          }))
        correct_pattern: |
          const driver = defineDriver({ Increment: { amount: ITFBigInt } }, () => {
            let count = 0n
            return {
              Increment: ({ amount }) => { count += amount },
              getState: () => ({ count }),
            }
          })
        source: 'README.md, maintainer interview'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Import from wrong entry point'
        mechanism: 'Importing defineDriver from @firfi/quint-connect-ts (simple) when using Effect Schema, or vice versa. Types look similar, runtime differs.'
        wrong_pattern: |
          import { defineDriver } from "@firfi/quint-connect-ts"
          // then use Effect Schema picks and Effect-returning handlers
        correct_pattern: |
          import { defineDriver } from "@firfi/quint-connect-ts/effect"
          // Effect Schema picks, Effect-returning handlers
        source: 'package.json exports, src/simple.ts, src/effect.ts'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Forget Effect.provide(NodeContext.layer)'
        mechanism: 'Effect API needs platform services for filesystem/subprocess. Missing provider causes cryptic missing-service error at runtime.'
        wrong_pattern: |
          const result = await Effect.runPromise(quintRun(opts))
        correct_pattern: |
          const result = await Effect.runPromise(
            quintRun(opts).pipe(Effect.provide(NodeContext.layer))
          )
        source: 'README.md, src/cli/quint.ts'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Destructure trace data from quintRun result'
        mechanism: 'quintRun returns { tracesReplayed, seed }, not traces or state. AI destructures trace data and uses undefined downstream.'
        wrong_pattern: |
          const { traces, states } = await Effect.runPromise(quintRun(opts))
        correct_pattern: |
          const { tracesReplayed, seed } = await Effect.runPromise(
            quintRun(opts).pipe(Effect.provide(NodeContext.layer))
          )
        source: 'src/runner/runner.ts, README.md'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Add beforeEach/afterEach lifecycle hooks'
        mechanism: 'quint-connect-ts handles per-trace setup via the factory pattern. Test framework lifecycle hooks conflict or duplicate.'
        wrong_pattern: |
          let count = 0n
          beforeEach(() => { count = 0n })
          test("counter", async () => {
            await run({ driver: defineDriver(..., () => ({ ... })) })
          })
        correct_pattern: |
          test("counter", async () => {
            await run({
              driver: defineDriver({ Increment: { amount: ITFBigInt } }, () => {
                let count = 0n  // fresh per trace — factory handles reset
                return { Increment: ({ amount }) => { count += amount } }
              }),
            })
          })
        source: 'maintainer interview'
        priority: 'MEDIUM'
        status: 'active'

    compositions:
      - library: 'effect'
        skill: null
      - library: 'vitest'
        skill: null
      - library: 'zod'
        skill: null

  - name: 'ITF type decoding'
    slug: 'quint-connect-ts-itf-decoding'
    domain: 'itf-decoding'
    description: 'Decode Quint ITF JSON encoding to native JS types: ITFBigInt for {"#bigint":"N"}, ITFSet for {"#set":[...]}, ITFMap for {"#map":[[k,v],...]}, ITFVariant, ItfOption. Use with both Zod and Effect Schema.'
    type: 'core'
    covers:
      - 'ITFBigInt'
      - 'ITFSet(inner)'
      - 'ITFMap(key, value)'
      - 'ITFTuple(...schemas)'
      - 'ITFVariant(tags)'
      - 'ITFUnserializable'
      - 'ItfOption(inner)'
      - 'transformITFValue'
      - 'Zod re-exports (@firfi/quint-connect-ts/zod)'
      - 'Fully-qualified state variable names'
    tasks:
      - 'Write ITF decoders for Quint types (maps, sets, tuples, records, variants, options)'
      - 'Figure out fully-qualified state variable names from ITF output'
      - 'Write a structural comparator for Maps, Sets, nested records'
      - 'Debug ITF decode errors (schema mismatch)'
    failure_modes:
      - mistake: 'Hallucinate ITFInt or ITFNumber schema'
        mechanism: 'No ITFInt or ITFNumber exists. Quint integers are always {"#bigint":"N"} → ITFBigInt → bigint. AI invents a direct number decoder.'
        wrong_pattern: |
          import { ITFInt } from "@firfi/quint-connect-ts/effect"
          const CounterState = Schema.Struct({ count: ITFInt })
        correct_pattern: |
          import { ITFBigInt } from "@firfi/quint-connect-ts/effect"
          const CounterState = Schema.Struct({ count: ITFBigInt })
        source: 'src/itf/schema.ts, README.md'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Use Schema.Number directly on ITF values'
        mechanism: 'ITF integers are {"#bigint":"42"}, not raw numbers. Schema.Number silently fails or throws cryptically.'
        wrong_pattern: |
          const State = Schema.Struct({ count: Schema.Number })
        correct_pattern: |
          const State = Schema.Struct({ count: ITFBigInt })
        source: 'src/itf/schema.ts, README.md'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Use short variable names in state schema'
        mechanism: 'ITF state keys are fully qualified: "testmod::specmod::var", not "var". Short names decode to undefined silently.'
        wrong_pattern: |
          const State = Schema.Struct({ count: ITFBigInt })
          // spec has: module counter_test { import counter.* }
        correct_pattern: |
          const State = Schema.Struct({ "counter_test::counter::count": ITFBigInt })
          // or use config.statePath to scope
        source: 'maintainer interview, test/runner.test.ts'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Use === for Map/Set comparison'
        mechanism: '=== is reference equality for Maps/Sets. JSON.stringify on Maps produces "{}". Both silently produce wrong results.'
        wrong_pattern: |
          stateCheck(
            (raw) => Schema.decodeUnknownSync(MyState)(raw),
            (spec, impl) => spec.data === impl.data, // Map === Map is always false
          )
        correct_pattern: |
          stateCheck(
            (raw) => Schema.decodeUnknownSync(MyState)(raw),
            (spec, impl) => {
              if (spec.data.size !== impl.data.size) return false
              for (const [k, v] of spec.data) {
                if (!impl.data.has(k) || impl.data.get(k) !== v) return false
              }
              return true
            },
          )
        source: 'maintainer interview'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Number(bigint) without bounds checking'
        mechanism: 'Quint bigints can exceed Number.MAX_SAFE_INTEGER. For small constants this works. For larger values, silent precision loss causes false-positive state matches.'
        wrong_pattern: |
          Increment: ({ amount }) => { count += Number(amount) }
        correct_pattern: |
          Increment: ({ amount }) => { count += amount }  // keep as bigint
          // or: if (amount > BigInt(Number.MAX_SAFE_INTEGER)) throw ...
        source: 'maintainer interview'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Generate unused encode branches in Schema.transform'
        mechanism: 'Schema.transform requires decode+encode. AI fills encode with wrong logic. Compiles, never runs, misleads readers.'
        wrong_pattern: |
          const MyBigInt = Schema.transform(
            Schema.Struct({ "#bigint": Schema.String }),
            Schema.BigIntFromSelf,
            { decode: (v) => BigInt(v["#bigint"]), encode: (n) => ({ "#bigint": n.toString() }) }
          )
        correct_pattern: |
          import { ITFBigInt } from "@firfi/quint-connect-ts/effect"
          // use the provided schema — no custom transform needed
        source: 'maintainer interview'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'Debug failing trace'
    slug: 'quint-connect-ts-debug'
    domain: 'debugging'
    description: 'Diagnose quint-connect-ts test failures: StateMismatchError (state diverged at step N), TraceReplayError (handler threw), NoTracesError (wrong module or unsatisfiable spec), ITF decode errors. Reproduce with seed.'
    type: 'core'
    covers:
      - 'StateMismatchError (traceIndex, stepIndex, expected, actual)'
      - 'TraceReplayError (traceIndex, stepIndex, action, cause)'
      - 'NoTracesError'
      - 'QuintError'
      - 'QuintNotFoundError'
      - 'Seed-based reproduction'
      - 'traceDir for trace inspection'
      - 'Manual quint run --mbt inspection'
    tasks:
      - 'Debug StateMismatchError — understand what diverged at which step'
      - 'Debug TraceReplayError — find which action handler threw and why'
      - 'Debug NoTracesError — fix wrong module name or unsatisfiable spec'
      - 'Debug ITF decode errors — fix schema mismatch'
      - 'Reproduce a failure deterministically with seed'
      - 'Inspect raw ITF traces with traceDir'
    failure_modes:
      - mistake: 'Re-run without seed and chase different failure'
        mechanism: 'Without seed, quintRun generates different random traces each time. The original failure is not reproduced.'
        wrong_pattern: |
          // test failed, re-run:
          await run({ spec: "./counter.qnt", nTraces: 10 })
          // different traces, different failure
        correct_pattern: |
          // use the seed from the failed run:
          await run({ spec: "./counter.qnt", nTraces: 10, seed: "0x138ff8c9" })
          // exact same traces, same failure
        source: 'README.md, maintainer interview'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Hack the comparator to hide mismatches'
        mechanism: 'When state diverges, adding exceptions to the comparator (sorting, ignoring fields) masks real bugs. The spec is the source of truth.'
        wrong_pattern: |
          stateCheck(deserialize, (spec, impl) => {
            // "fix" by ignoring the diverging field
            const { internalField: _, ...specRest } = spec
            const { internalField: __, ...implRest } = impl
            return deepEqual(specRest, implRest)
          })
        correct_pattern: |
          // Fix the TS implementation to match the spec exactly
          // The spec defines correct behavior — if state diverges,
          // the implementation has a bug
          stateCheck(deserialize, (spec, impl) =>
            spec.count === impl.count && spec.flag === impl.flag
          )
        source: 'maintainer interview'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Return live mutable object from getState'
        mechanism: 'The runner compares state after each step. Returning a reference means the "expected" snapshot mutates with the live state. Comparisons always pass.'
        wrong_pattern: |
          const state = { items: new Map() }
          return {
            getState: () => state, // returns live reference
          }
        correct_pattern: |
          const state = { items: new Map() }
          return {
            getState: () => ({ items: new Map(state.items) }), // snapshot
          }
        source: 'maintainer interview'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Use nTraces: 1 in CI for speed'
        mechanism: 'A single trace covers one random execution path. Bugs on other paths pass CI and merge.'
        wrong_pattern: |
          await run({ spec: "./spec.qnt", nTraces: 1, maxSteps: 50 })
        correct_pattern: |
          await run({ spec: "./spec.qnt", nTraces: 10, maxSteps: 50 })
          // 10 traces covers diverse paths without being slow
        source: 'maintainer interview'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Hardcode relative spec path'
        mechanism: '"../../my_spec.qnt" works locally but breaks in CI with different working directory.'
        wrong_pattern: |
          await run({ spec: "../../specs/counter.qnt" })
        correct_pattern: |
          import { fileURLToPath } from "node:url"
          const specPath = fileURLToPath(new URL("../../specs/counter.qnt", import.meta.url))
          await run({ spec: specPath })
        source: 'maintainer interview, examples/counter/counter.test.ts'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Use Effect.orDie in production state deserializer'
        mechanism: 'orDie converts decode failure to an untyped defect. Loses traceIndex/stepIndex context that StateMismatchError provides.'
        wrong_pattern: |
          stateCheck(
            (raw) => Schema.decodeUnknown(MyState)(raw).pipe(Effect.orDie),
            (spec, impl) => spec.count === impl.count,
          )
        correct_pattern: |
          stateCheck(
            (raw) => Schema.decodeUnknown(MyState)(raw),
            (spec, impl) => spec.count === impl.count,
          )
          // Let decode errors propagate as TraceReplayError with context
        source: 'maintainer interview'
        priority: 'MEDIUM'
        status: 'active'
        skills: ['quint-connect-ts-debug', 'quint-connect-ts-setup']

tensions:
  - name: 'Setup simplicity vs production robustness'
    skills: ['quint-connect-ts-setup', 'quint-connect-ts-debug']
    description: 'Simple setup patterns (orDie, nTraces: 1, partial state comparison) work for prototyping but mask bugs in production.'
    implication: 'Agent generates minimal working code that passes initial testing but fails in CI or on edge cases.'

  - name: 'Type safety vs ITF decoding complexity'
    skills: ['quint-connect-ts-setup', 'quint-connect-ts-itf-decoding']
    description: 'Fully typed ITF decoding is verbose (Schema.Struct with fully-qualified keys, ITFBigInt everywhere). Shortcuts (raw JSON, short names) are simpler but silently wrong.'
    implication: 'Agent simplifies state schemas for readability, producing code that compiles but decodes to undefined or wrong types at runtime.'

